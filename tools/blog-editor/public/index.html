<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog Editor</title>
    <link rel="stylesheet" href="/vendor/blog-editor/milkdown-editor.css" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main id="editor-shell" class="editor-shell">
      <header class="topbar">
        <div class="window-dots" aria-hidden="true">
          <span class="dot danger"></span>
          <span class="dot warning"></span>
          <span class="dot success"></span>
        </div>
        <p class="terminal-command">$ blog-editor --local <span>/ src/content/blog</span></p>
        <span id="status" class="status" data-tone="info">booting</span>
      </header>

      <section class="workspace">
        <aside class="file-explorer" aria-label="本地文章文件列表">
          <div class="explorer-head">
            <div>
              <p class="kicker">workspace</p>
              <h1>content/blog</h1>
            </div>
            <button id="new-post" type="button" class="secondary-action">New draft</button>
          </div>
          <div id="post-list" class="file-list" aria-live="polite"></div>
        </aside>

        <section class="editor-panel">
          <div class="actionbar">
            <div class="document-id">
              <p class="kicker">$ edit typora-like markdown</p>
              <h2 id="current-title">Select a post</h2>
              <p id="current-path">src/content/blog</p>
            </div>
            <div class="actions">
              <button id="delete-post" type="button" class="ghost danger-action">Delete</button>
              <button id="save-post" type="submit" form="post-form" class="primary-action">Save</button>
            </div>
          </div>

          <form id="post-form" class="metadata-card">
            <div class="metadata-head">
              <span>frontmatter</span>
              <code id="slug-label">unselected</code>
            </div>
            <div class="form-grid">
              <label>
                <span>Slug</span>
                <input id="slug" name="slug" pattern="[a-z0-9]+(-[a-z0-9]+)*" placeholder="my-new-post" required />
              </label>
              <label>
                <span>Title</span>
                <input id="title" name="title" placeholder="Post title" required />
              </label>
              <label class="wide">
                <span>Description</span>
                <input id="description" name="description" placeholder="Short summary for list pages and RSS" required />
              </label>
              <label>
                <span>Published</span>
                <input id="pubDate" name="pubDate" type="date" required />
              </label>
              <label>
                <span>Updated</span>
                <input id="updatedDate" name="updatedDate" type="date" />
              </label>
              <label>
                <span>Tags</span>
                <input id="tags" name="tags" placeholder="AI, Astro, Notes" />
              </label>
              <label class="checkbox">
                <input id="draft" name="draft" type="checkbox" />
                <span>Draft <small>hidden in production</small></span>
              </label>
            </div>
          </form>

          <section class="typora-surface" aria-label="Typora-like Markdown editor">
            <div class="writing-toolbar" aria-label="Markdown quick actions">
              <button type="button" data-command="zen">Zen</button>
              <button type="button" data-command="save" class="primary-action">Save</button>
              <span class="toolbar-separator" aria-hidden="true"></span>
              <button type="button" data-command="h1">H1</button>
              <button type="button" data-command="h2">H2</button>
              <button type="button" data-command="h3">H3</button>
              <button type="button" data-command="bold">Bold</button>
              <button type="button" data-command="italic">Italic</button>
              <span class="toolbar-separator" aria-hidden="true"></span>
              <button type="button" data-command="link">Link</button>
              <button type="button" data-command="image-url">Image URL</button>
              <button type="button" data-command="upload-image">Upload Image</button>
              <span class="toolbar-separator" aria-hidden="true"></span>
              <button type="button" data-command="bullet">Bullet</button>
              <button type="button" data-command="ordered">Ordered</button>
              <button type="button" data-command="task">Task</button>
              <button type="button" data-command="quote">Quote</button>
              <button type="button" data-command="code">Code</button>
              <button type="button" data-command="table">Table</button>
              <button type="button" data-command="math">Math</button>
              <span class="toolbar-separator" aria-hidden="true"></span>
              <button type="button" data-command="undo">Undo</button>
              <button type="button" data-command="redo">Redo</button>
              <button id="exit-zen" type="button" data-command="exit-zen" class="ghost zen-only">Exit Zen</button>
            </div>
            <div id="content" class="milkdown-host"></div>
          </section>
        </section>
      </section>
    </main>

    <input id="asset-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif,image/svg+xml" hidden />

    <dialog id="insert-dialog" class="insert-dialog">
      <form method="dialog" id="insert-form" class="insert-card">
        <div>
          <p class="kicker" id="dialog-kicker">insert</p>
          <h2 id="dialog-title">Insert</h2>
        </div>
        <label>
          <span id="dialog-text-label">Text</span>
          <input id="dialog-text" type="text" autocomplete="off" />
        </label>
        <label>
          <span id="dialog-url-label">URL</span>
          <input id="dialog-url" type="url" autocomplete="off" />
        </label>
        <div class="dialog-actions">
          <button id="dialog-cancel" type="button" class="ghost">Cancel</button>
          <button id="dialog-submit" type="submit" class="primary-action">Insert</button>
        </div>
      </form>
    </dialog>

    <script src="/vendor/blog-editor/milkdown-editor.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
